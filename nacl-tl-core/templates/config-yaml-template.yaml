# Project configuration — single source of truth for all skills
# Created by /nacl-init. Edit values for your project.

project:
  name: "{{PROJECT_NAME}}"
  stack: "{{TECH_STACK}}"
  description: "{{PROJECT_DESCRIPTION}}"

# Infrastructure (VPS/servers)
# Used by: nacl-tl-deploy (SSH diagnostics on health-check failure), nacl-tl-dev TECH (infra tasks),
#          nacl-tl-diagnose (server health), nacl-tl-fix (bug reproduction on staging/prod)
vps:
  staging:
    ip: ""              # Staging server IP
    user: ""            # SSH user
    ssh_key: "~/.ssh/id_rsa"
    deploy_user: ""     # User that runs the app (e.g., PM2 user)
  production:
    ip: ""
    user: ""
    ssh_key: "~/.ssh/id_rsa"
    deploy_user: ""

# Modules (what gets built, tested, and deployed)
modules:
  # Example for a fullstack project:
  # frontend:
  #   path: "frontend"
  #   stack: "Next.js"
  #   port: 3000
  #   build_cmd: "npm run build"
  #   test_cmd: "npm test"
  #   git_strategy: "direct"       # "direct" or "feature-branch"
  #   git_base_branch: "main"
  # backend:
  #   path: "backend"
  #   stack: "Fastify"
  #   port: 3001
  #   build_cmd: "npm run build"
  #   test_cmd: "npm test"
  #   git_strategy: "direct"
  #   git_base_branch: "main"

# Git strategy (top-level default, modules can override with git_strategy per module)
git:
  strategy: "feature-branch"   # "direct" or "feature-branch"
  main_branch: "main"
  branch_prefix: "feature/"

# Credentials: infrastructure access + test users for QA/debugging
# Used by: nacl-tl-qa (E2E login), nacl-tl-verify (delegates to nacl-tl-qa), nacl-tl-fix (bug reproduction)
credentials:
  # Infrastructure/service access:
  # db:
  #   host: "localhost"
  #   port: 5432
  #   user: "app_user"
  #   password: ""           # from env: DB_PASSWORD
  #   database: "myapp"
  #
  # Test users for E2E testing (role → credentials):
  # admin:
  #   email: "admin@test.com"
  #   password: "test-password"
  #   role: "admin"
  # user:
  #   phone: "+79990001111"
  #   password: "user-password"
  #   role: "user"

# Task management (YouGile)
# See /nacl-init output for YouGile setup instructions
yougile:
  api_base: "https://yougile.com/api-v2"
  project_id: ""
  board_id: ""
  columns:
    user_requests: ""   # User/client creates cards here
    backlog: ""         # Agent decomposes into tasks
    in_work: ""         # Agent picks up for development
    dev_done: ""        # Development complete
    ready_to_test: ""   # Ready for verification
    testing: ""         # Agent verifying
    to_release: ""      # Verified, ready to deploy
    reopened: ""        # Failed verification
    done: ""            # Deployed to production
  stickers:
    task_type:
      id: ""
      states:
        task: ""
        bug: ""
        feature: ""
    module:
      id: ""
      states: {}        # Add your modules: { frontend: "id", backend: "id" }
    source:
      id: ""
      states:
        user: ""
        agent: ""
  # Auto-create bug tasks from QA results
  auto_create_bugs:
    critical: true      # always create (cannot disable)
    major: true         # default: create in Reopened column
    minor: false        # default: skip (reduce noise)

# Deployment
# Used by: nacl-tl-ship (commit + push), nacl-tl-deliver (CI + health), nacl-tl-deploy (monitor), nacl-tl-release
deploy:
  ci_platform: ""              # auto-detected from .github/workflows/ if empty
  staging:
    method: "github-actions"   # "direct" (run script) or "github-actions" (CI/CD)
    trigger: "push to feature/* branch"
    url: ""                    # https://staging.example.com
    health_endpoint: "/api/health"
    # Direct deploy settings (only if method: "direct"):
    # script: "deploy/staging.sh"
    # skip_ci: false
    # env_file: ".env.staging"
  production:
    trigger: "push to main branch"
    url: ""                    # https://example.com
    health_endpoint: "/api/health"

# Test reports (verification, QA)
# If mode is "local" or section is empty → reports saved to .tl/reports/ (default)
# If mode is "remote" → reports also published via rsync to a server
reports:
  mode: "local"         # "local" (default) or "remote"
  local_path: ".tl/reports"   # relative to project root
  # Remote settings (only used if mode: "remote"):
  ssh_host: ""          # user@ip (e.g., deploy@108.181.215.149)
  remote_path: "/srv/reports"
  domain: ""            # reports.example.com
  retention_days: 30

# Documentation publishing (Docmost)
# Single source of truth for Docmost connection settings.
# Publish skills (sa-publish, ba-publish) read space_id/root_page_id from here.
# Manifest files (docs/.docmost-sync*.json) track page-level sync state only.
docmost:
  api_url: ""           # https://docs.example.com/api
  # Credentials from env: DOCMOST_EMAIL, DOCMOST_PASSWORD
  spaces:
    sa:
      space_id: ""      # Docmost space for SA documentation
      root_page_id: ""  # Root page in that space
    ba:
      space_id: ""      # Docmost space for BA documentation
      root_page_id: ""

# Graph Infrastructure (Neo4j + Excalidraw)
# Each project gets its own Docker Compose stack with unique ports.
# Used by: all nacl-* skills (BA/SA/TL graph analysis)
# Setup: /nacl-init creates graph-infra/ with docker-compose.yml + .env + schema + queries
graph:
  neo4j_bolt_port: 3587          # Bolt protocol port (MUST be unique per project on same host)
  neo4j_http_port: 3574          # Neo4j Browser UI port
  neo4j_password: "neo4j_graph_dev"
  excalidraw_port: 3580          # Excalidraw visual editor port
  excalidraw_room_port: 3581     # Excalidraw WebSocket collaboration port
  container_prefix: ""           # Docker container name prefix (auto: project name if empty)
  boards_dir: "graph-infra/boards"  # Board files directory (relative to project root)
