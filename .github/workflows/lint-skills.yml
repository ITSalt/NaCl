name: Lint Skills

on:
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SKILL.md frontmatter
        run: |
          errors=0
          for dir in */; do
            if [ -f "$dir/SKILL.md" ]; then
              if ! head -1 "$dir/SKILL.md" | grep -q '^---$'; then
                echo "ERROR: $dir/SKILL.md missing YAML frontmatter"
                errors=$((errors + 1))
              elif ! grep -A 10 '^---$' "$dir/SKILL.md" | grep -q '^name:'; then
                echo "ERROR: $dir/SKILL.md missing 'name' field in frontmatter"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors skill(s) with invalid frontmatter"
            exit 1
          fi
          echo "All skills have valid frontmatter"

      - name: Check for hardcoded paths
        run: |
          # Flag genuine machine-specific absolute paths like /Users/<name>/... ,
          # which leak a developer's username / local layout. Home-relative '~'
          # examples and docs that merely cite the patterns (the contributing
          # checklist, the canary-rule text in CLAUDE.md, and the tool's own
          # `~/projects/NaCl` search-path documentation) carry no private info
          # and must not trip this gate. The previous `~/projects/|/Users/`
          # substring match false-positived on all of the above.
          if git ls-files | grep -vE '^\.github/' \
               | xargs grep -nE '/Users/[A-Za-z0-9_-]+/' 2>/dev/null; then
            echo "ERROR: Found hardcoded machine-specific paths in tracked files"
            exit 1
          fi
          echo "No hardcoded paths found"

      - name: Check for credential patterns
        run: |
          # Flag literal secret assignments while ignoring the legitimate
          # scaffolding this repo ships: env-var references ($VAR), templated
          # placeholders ({...}/<...>), commented-out examples, and the
          # documented local dev default (neo4j_graph_dev, quoted or bare). The
          # previous bare `PASSWORD=.+` match false-positived on all of these;
          # the earlier `=neo4j_graph_dev` exclusion missed the quoted form
          # `="neo4j_graph_dev"` (as written in setup-graph.sh), so widen it to
          # tolerate optional surrounding quotes.
          matches=$(git ls-files | grep -vE '^\.github/|\.env' \
            | xargs grep -nHE '(API_KEY|PASSWORD|SECRET)=[^[:space:]]+' 2>/dev/null \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#' \
            | grep -vE '=[^[:space:]]*[$<{]' \
            | grep -vE '=["'"'"']?neo4j_graph_dev["'"'"']?([;[:space:]]|$)' \
            || true)
          if [ -n "$matches" ]; then
            echo "ERROR: Found potential credentials in tracked files"
            echo "$matches"
            exit 1
          fi
          echo "No credential patterns found"

      - name: Check for hardcoded branch names
        run: |
          # Flag literal branch names (main/master/develop) in git/gh commands
          # inside shell code fences. Skills must resolve the base branch from
          # config.yaml ({main_branch} / <git_base_branch>), never hardcode it —
          # a hardcoded branch silently breaks on projects with a non-default
          # base branch (this is how a stale `develop` / `main` slips through).
          # Prose and output blocks are not scanned; escape hatch is a trailing
          # `# branch-literal-ok` comment. See config-schema.md "Branch-name
          # discipline".
          sh scripts/check-branch-literals.sh

      - name: Check for framework-default version pins
        run: |
          # Flag pinned technology versions (node-version, image tags) in
          # project-facing infra templates. NaCl is technology-agnostic —
          # versions are the project's decision (config.yaml / detected
          # toolchain), never a framework default. Graph-stack compose files
          # (NaCl's own infra) are out of scope. Escape hatch is a trailing
          # `# version-pin-ok` comment.
          sh scripts/check-version-pins.sh

      - name: Check graph-down HALT snippet sync
        run: |
          # The "Neo4j is not reachable" HALT message is duplicated across
          # graph skills; the canon lives in nacl-core/SKILL.md § Graph-Down
          # HALT (canonical). This gate fails on any drifted copy so Desktop
          # and CLI users always get the same (graph-doctor-based) remediation.
          sh scripts/check-graph-halt-snippet.sh

      - name: Check root/Codex skill sync
        run: |
          sh skills-for-codex/scripts/check-root-codex-sync.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}"
