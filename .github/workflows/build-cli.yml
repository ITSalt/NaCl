name: Build CLI Tools

on:
  pull_request:
    branches: [main]
    paths:
      - 'docmost-sync/**'
      - 'yougile-setup/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [docmost-sync, yougile-setup]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.tool }}/package-lock.json

      - name: Build ${{ matrix.tool }}
        run: |
          cd ${{ matrix.tool }}
          npm ci
          npm run build
