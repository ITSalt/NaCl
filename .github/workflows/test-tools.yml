name: Test Skill Tools

# Runs the equivalence-pin tests for deterministic skill tools (the scripts that
# replace inline procedural prose). Node `.mjs` tools use `node --test`; bash tools
# use a self-asserting `*.test.sh` plus a `bash -n` syntax check. This job also
# retro-covers nacl-tl-verify-code/scripts/classify-status.test.mjs, which existed
# before any CI ran Node tests. The `pwsh-syntax` job parses every tracked `.ps1`
# with the PowerShell .NET parser (pwsh is preinstalled on ubuntu runners).

on:
  pull_request:
    branches: [main]
    paths:
      - '**/scripts/*.mjs'
      - '**/scripts/*.sh'
      - 'scripts/*.mjs'
      - 'scripts/*.sh'
      - '**.ps1'
      - '.github/workflows/test-tools.yml'
  push:
    branches: [main]
    paths:
      - '**/scripts/*.mjs'
      - '**/scripts/*.sh'
      - 'scripts/*.mjs'
      - 'scripts/*.sh'
      - '**.ps1'
      - '.github/workflows/test-tools.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node tool tests (node --test)
        shell: bash
        run: |
          # plugin/ is a generated artifact: its copied tests reference
          # repo-root-relative paths/fixtures and must not run from the
          # plugin tree.
          tests=$(git ls-files '*/scripts/*.test.mjs' 'scripts/*.test.mjs' ':!plugin/**' ':!tests/codex-plugin/**')
          if [ -z "$tests" ]; then
            echo "No Node tool tests found."
          else
            echo "Running Node test file(s):"; echo "$tests" | sed 's/^/  /'
            # paths in this repo contain no spaces; intentional word-split
            node --test $tests
          fi

      - name: Bash tool tests + syntax check
        shell: bash
        run: |
          failed=0
          for t in $(git ls-files '*/scripts/*.test.sh' 'scripts/*.test.sh' ':!plugin/**' ':!tests/codex-plugin/**'); do
            echo "== run $t =="
            bash "$t" || failed=1
          done
          for s in $(git ls-files '*/scripts/*.sh' 'scripts/*.sh' ':!plugin/**' ':!tests/codex-plugin/**'); do
            bash -n "$s" || { echo "SYNTAX FAIL: $s"; failed=1; }
          done
          exit "$failed"

  pwsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          # plugin/ copies of .ps1 scripts are byte-identical build artifacts:
          # excluded here like the other plugin globs in this workflow.
          $files = @(git ls-files '*.ps1' ':!plugin/**' ':!tests/codex-plugin/**')
          if ($files.Count -eq 0) { Write-Output 'No PowerShell scripts found.'; exit 0 }
          $failed = 0
          foreach ($f in $files) {
            $errs = $null
            $full = (Resolve-Path -LiteralPath $f).ProviderPath
            [void][System.Management.Automation.Language.Parser]::ParseFile($full, [ref]$null, [ref]$errs)
            if ($errs) {
              Write-Output "FAIL: $f"
              $errs | ForEach-Object { Write-Output "  line $($_.Extent.StartLineNumber): $($_.Message)" }
              $failed = 1
            } else {
              Write-Output "OK: $f"
            }
          }
          exit $failed
