services:
  neo4j:
    image: neo4j:5-community
    container_name: ${CONTAINER_PREFIX:-graph}-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-3574}:7474"
      - "${NEO4J_BOLT_PORT:-3587}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_graph_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - graph-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  excalidraw:
    image: alswl/excalidraw:v0.18.0-fork-b3
    container_name: ${CONTAINER_PREFIX:-graph}-excalidraw
    restart: unless-stopped
    ports:
      - "${EXCALIDRAW_PORT:-3580}:80"
    environment:
      VITE_APP_WS_SERVER_URL: http://localhost:${EXCALIDRAW_ROOM_PORT:-3581}
    networks:
      - graph-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  excalidraw-room:
    image: excalidraw/excalidraw-room:latest
    container_name: ${CONTAINER_PREFIX:-graph}-excalidraw-room
    restart: unless-stopped
    ports:
      - "${EXCALIDRAW_ROOM_PORT:-3581}:80"
    environment:
      PORT: 80
    networks:
      - graph-net

volumes:
  neo4j-data:
    name: ${CONTAINER_PREFIX:-graph}-neo4j-data
  neo4j-logs:
    name: ${CONTAINER_PREFIX:-graph}-neo4j-logs

networks:
  graph-net:
    name: ${CONTAINER_PREFIX:-graph}-net
    driver: bridge
